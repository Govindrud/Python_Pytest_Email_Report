[tool:pytest]
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
filterwarnings =ignore::DeprecationWarning:.*_pytest.assertion.rewrite.*

# pytest.ini
[pytest]
markers =
    positive: marks tests that are expected to pass with valid inputs
    negative: marks tests that validate behavior with invalid inputs
    smoke: marks smoke tests for quick validation of core features
